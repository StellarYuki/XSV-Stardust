<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>LCARS Star Map</title>
  <style>
    body {
      margin: 0;
      background: #000010;
      color: #ffcc88;
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    #toolbar {
      padding: 8px 12px;
      background: #221133;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 14px;
    }
    #mapContainer {
      flex: 1;
      position: relative;
    }
    #starMap {
      display: block;
      width: 100%;
      height: 100%;
      background: #020214;
      cursor: grab;
    }
    #infoPanel {
      position: absolute;
      right: 10px;
      top: 10px;
      padding: 8px 12px;
      background: rgba(10, 5, 30, 0.9);
      border: 1px solid #ffcc88;
      font-size: 13px;
      max-width: 260px;
    }
    .label {
      color: #ffcc88;
    }
    button {
      background: #442266;
      border: 1px solid #ffcc88;
      color: #ffcc88;
      padding: 4px 8px;
      cursor: pointer;
      font-size: 13px;
    }
    button:hover {
      background: #663388;
    }
  </style>
</head>
<body>
  <div id="toolbar">
    <span>LCARS ASTROMETRICS — GALACTIC MAP</span>
    <button id="zoomInBtn">Zoom In</button>
    <button id="zoomOutBtn">Zoom Out</button>
    <button id="resetViewBtn">Reset View</button>
  </div>

  <div id="mapContainer">
    <canvas id="starMap"></canvas>
    <div id="infoPanel">
      <div class="label"><strong>Selected:</strong> <span id="selectedName">None</span></div>
      <div class="label"><strong>Type:</strong> <span id="selectedType">—</span></div>
      <div class="label"><strong>Notes:</strong> <span id="selectedNotes">—</span></div>
      <hr />
      <div class="label"><strong>Ship:</strong> XSV Stardust</div>
      <div class="label"><strong>Location:</strong> <span id="stardustLocation">Near Warren Wormhole</span></div>
    </div>
  </div>

  <script src="map_config.js"></script>
  <script src="map_renderer.js"></script>
</body>
</html>
